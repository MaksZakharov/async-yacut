<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}YaCut{% endblock %}</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='img/fav/favicon.ico') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  </head>

  <body>
    <header class="navbar navbar-light bg-light shadow-sm mb-4">
      <div class="container">
        <a class="navbar-brand" href="{{ url_for('main.index') }}">
          <img src="{{ url_for('static', filename='img/logo.png') }}" alt="YaCut" height="40">
        </a>
        <nav>
          <a class="nav-link d-inline-block" href="{{ url_for('main.index') }}">ГЛАВНАЯ</a>
          <a class="nav-link d-inline-block" href="{{ url_for('main.files') }}">ЗАГРУЗКА ФАЙЛОВ</a>
        </nav>
      </div>
    </header>
    
    <main class="container">
      {% block content %}{% endblock %}
    </main>
    
    <footer class="bg-light text-center py-4 mt-5">
      <p class="text-muted mb-0">&copy; 2025 YaCut. Сервис укорачивания ссылок.</p>
    </footer>
    
    <script src="{{ url_for('static', filename='js/bootstrap.bundle.min.js') }}"></script>
  </body>
</html>
