{% extends "base.html" %}

{% block title %}
  Ошибка 404 — YaCut
{% endblock %}

{% block content %}
  <div class="error-page">
    <h2>404</h2>
    <p>Страница не найдена</p>
    <p>{{ error_message or "Запрашиваемая страница не существует." }}</p>
    <a href="{{ url_for('main.index') }}" class="btn btn-primary">
      Вернуться на главную
    </a>
  </div>
{% endblock %}
